<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            background: rgba(60, 70, 50, 0.95);
            padding: 35px;
            border: 8px solid #8b6f47;
            border-radius: 15px;
            color: #e8d9b0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: #3f4a32;
            color: #e8d9b0;
            border: 2px solid #8b6f47;
            border-radius: 8px;
            font-size: 1.05rem;
        }
        button {
            background: #8b6f47;
            cursor: pointer;
            font-weight: bold;
            padding: 16px;
        }
        button:hover { background: #a68a5e; }

        .site-item {
            background: #4a5f3a;
            padding: 15px;
            margin: 12px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #3f4a32;
            padding: 30px;
            border: 6px solid #8b6f47;
            border-radius: 15px;
            max-width: 420px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>Админ-панель</h1>

    <form id="addForm">
        <input type="hidden" id="editId">

        <div class="form-group">
            <input type="text" id="name" placeholder="Название сайта" required>
        </div>
        <div class="form-group">
            <input type="url" id="url" placeholder="URL сайта[](https://...)" required>
        </div>
        <div class="form-group">
            <select id="category" required>
                <option value="">Выберите категорию</option>
                <option value="services">Услуги</option>
                <option value="marketplace">Маркетплейсы</option>
                <option value="store">Интернет-магазины</option>
            </select>
        </div>
        <div class="form-group">
            <label>Иконка сайта:</label><br>
            <input type="file" id="iconFile" accept="image/*" onchange="previewImage(this)">
            <div id="imagePreview" style="margin:12px 0; min-height:50px;"></div>
            <input type="text" id="iconUrl" placeholder="Или ссылка на иконку">
        </div>

        <button type="submit" id="submitBtn">Добавить сайт</button>
    </form>

    <h2>Существующие сайты</h2>
    <div id="sites-list"></div>
</div>

<!-- модальное окно -->
<div id="modal" class="modal">
    <div class="modal-content">
        <p id="modal-text" style="margin-bottom:20px; font-size:1.2rem;"></p>
        <button onclick="closeModal()" style="background:#5c6b4a; margin:8px;">Отмена</button>
        <button id="modal-confirm" style="background:#9c4a4a; margin:8px;">Подтвердить</button>
    </div>
</div>

<script src="script.js"></script>
<script>
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.innerHTML = `<img src="${e.target.result}" style="max-width:140px; border:2px solid #8b6f47; border-radius:8px;">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function showModal(message, callback) {
        document.getElementById('modal-text').textContent = message;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-confirm').onclick = () => {
            closeModal();
            if (callback) callback();
        };
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    async function loadSites() {
        const res = await fetch('http://localhost:3000/sites');
        const sites = await res.json();
        const container = document.getElementById('sites-list');

        container.innerHTML = sites.map(site => `
                <div class="site-item">
                    <img src="${site.icon}" width="60" height="60" style="object-fit:contain; border-radius:8px;">
                    <div>
                        <strong>${site.name}</strong><br>
                        <small>${getCategoryRus(site.category)}</small>
                    </div>
                    <div style="margin-left:auto; display:flex; gap:8px;">
                        <button onclick="editSite(${site.id})">Изменить</button>
                        <button onclick="deleteSite(${site.id})" style="background:#9c4a4a">Удалить</button>
                    </div>
                </div>
            `).join('');
    }

    function getCategoryRus(cat) {
        const map = {
            services: 'Услуги',
            marketplace: 'Маркетплейсы',
            store: 'Интернет-магазины'
        };
        return map[cat] || cat;
    }

    document.getElementById('addForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        let icon = document.getElementById('iconUrl').value;
        const fileInput = document.getElementById('iconFile');

        if (fileInput.files[0]) {
            icon = await fileToBase64(fileInput.files[0]);
        }

        if (!icon) {
            alert("Добавьте иконку!");
            return;
        }

        const data = {
            name: document.getElementById('name').value,
            url: document.getElementById('url').value,
            category: document.getElementById('category').value,
            icon: icon
        };

        const editId = document.getElementById('editId').value;

        if (editId) {
            await fetch(`http://localhost:3000/sites/${editId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            showModal('Сайт успешно обновлён!', () => {
                loadSites();
                resetForm();
            });
        } else {
            await fetch('http://localhost:3000/sites', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            showModal('Сайт успешно добавлен!', () => {
                loadSites();
                resetForm();
            });
        }
    });

    function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    async function deleteSite(id) {
        showModal('Удалить этот сайт?', async () => {
            await fetch(`http://localhost:3000/sites/${id}`, { method: 'DELETE' });
            loadSites();
        });
    }

    async function editSite(id) {
        const res = await fetch('http://localhost:3000/sites');
        const sites = await res.json();
        const site = sites.find(s => s.id === id);

        if (site) {
            document.getElementById('editId').value = site.id;
            document.getElementById('name').value = site.name;
            document.getElementById('url').value = site.url;
            document.getElementById('category').value = site.category;
            document.getElementById('iconUrl').value = site.icon.startsWith('data:') ? '' : site.icon;

            document.getElementById('submitBtn').textContent = 'Сохранить изменения';

            // Превью текущей иконки
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = `<img src="${site.icon}" style="max-width:140px; border-radius:8px;">`;
        }
    }

    function resetForm() {
        document.getElementById('addForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('submitBtn').textContent = 'Добавить сайт';
    }

    // Запуск
    loadSites();
</script>
</body>
</html>
